<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <title>
        {% block title %}
        {% endblock %}
    </title>

    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- CSS -->
    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}"
    >

</head>

<body data-theme="dark">

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg px-4">

        <div class="container-fluid">

            <a
                class="navbar-brand fw-bold"
                href="/"
            >
                🏀 NBA Injury System
            </a>

            <button
                id="themeToggle"
                class="btn btn-outline-light"
            >
                🌙
            </button>

        </div>

    </nav>

    <div class="container-fluid">

        <div class="row">

            <!-- SIDEBAR -->
            <div class="col-2 sidebar">

                <h5 class="mt-4 mb-4">
                    Menu
                </h5>

                <a href="/">
                    🏠 Home
                </a>

                <a href="/jogadores">
                    🏀 Jogadores
                </a>

                <a href="/lesoes">
                    🏥 Lesões
                </a>

                <a href="/adicionar">
                    ➕ Adicionar Lesão
                </a>

                <a href="/pesquisar-lesao">
                    🔎 Pesquisar Lesão
                </a>

                <a href="/estatisticas">
                    📊 Estatísticas
                </a>

                <a href="/upload">
                    📂 Upload CSV
                </a>

                <a href="/upload-jogadores">
                    👥 Upload Jogadores
                </a>

            </div>

            <!-- CONTEÚDO -->
            <div class="col-10 content">

                {% block content %}
                {% endblock %}

            </div>

        </div>

    </div>

    <!-- BOOTSTRAP JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- THEME -->
    <script>

    const body = document.body;

    const toggle =
    document.getElementById(
        "themeToggle"
    );

    const savedTheme =
    localStorage.getItem(
        "theme"
    );

    if(savedTheme){

        body.setAttribute(
            "data-theme",
            savedTheme
        );

        toggle.innerHTML =

            savedTheme === "dark"

            ? "☀️"

            : "🌙";
    }

    toggle.addEventListener(

        "click",

        () => {

            const current =

                body.getAttribute(
                    "data-theme"
                );

            const newTheme =

                current === "dark"

                ? "light"

                : "dark";

            body.setAttribute(

                "data-theme",

                newTheme
            );

            localStorage.setItem(

                "theme",

                newTheme
            );

            toggle.innerHTML =

                newTheme === "dark"

                ? "☀️"

                : "🌙";
        }
    );

    </script>

</body>
</html>
