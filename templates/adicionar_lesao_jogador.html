{% extends "base.html" %}

{% block title %}
Adicionar Lesão
{% endblock %}

{% block content %}

<h1 class="mb-4">
    ➕ Adicionar Lesão
</h1>

<div class="card p-4 shadow-lg">

    <h4 class="mb-4">
        {{ jogador.jogador }}
    </h4>

    <form method="POST">

        <div class="mb-3">

            <label class="form-label">
                Tipo da lesão
            </label>

            <input
                type="text"
                name="tipo_lesao"
                class="form-control"
                required
            >

        </div>

        <div class="mb-3">

            <label class="form-label">
                Local da lesão
            </label>

            <input
                type="text"
                name="local_lesao"
                class="form-control"
            >

        </div>

        <div class="mb-3">

            <label class="form-label">
                Status
            </label>

            <select
                name="status"
                class="form-select"
            >

                <option value="out">
                    OUT
                </option>

                <option value="questionavel">
                    Questionável
                </option>

                <option value="ativo">
                    Ativo
                </option>

            </select>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Jogos perdidos
            </label>

            <input
                type="number"
                name="jogos_lesionado"
                class="form-control"
                value="0"
            >

        </div>

        <div class="mb-3">

            <label class="form-label">
                Data da lesão
            </label>

            <input
                type="date"
                name="data_lesao"
                class="form-control"
                value="{{ hoje }}"
            >

        </div>

        <div class="mb-3">

            <label class="form-label">
                Retorno previsto
            </label>

            <input
                type="date"
                name="retorno_previsto"
                class="form-control"
            >

        </div>

        <div class="mb-3">

            <label class="form-label">
                Observações
            </label>

            <textarea
                name="observacoes"
                class="form-control"
                rows="4"
            ></textarea>

        </div>

        <button class="btn btn-danger">
            Salvar Lesão
        </button>

    </form>

</div>

{% endblock %}
