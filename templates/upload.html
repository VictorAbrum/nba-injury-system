{% extends "base.html" %}

{% block title %}
Upload
{% endblock %}

{% block content %}

<h1 class="mb-4">📥 Upload CSV</h1>

<form method="POST" enctype="multipart/form-data">

    <div class="mb-3">

        <input
            type="file"
            name="arquivo"
            class="form-control"
            required
        >

    </div>

    <button class="btn btn-primary">
        Enviar
    </button>

</form>

{% endblock %}
